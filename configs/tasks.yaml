# Multi-degradation restoration task config
# lq_path / gt_path point to directories; images matched by stem.

train:
  - name: Train_Derain
    deg_type: rain
    lq_path: /path/to/derain/LQ_train
    gt_path: /path/to/derain/GT
    prompt: "a high quality clean image without rain streaks, clear visibility"

  - name: Train_Dehaze
    deg_type: haze
    lq_path: /path/to/dehaze/LQ_train
    gt_path: /path/to/dehaze/GT
    prompt: "a high quality clear image without haze, high contrast, sharp details"

  - name: Train_Denoise
    deg_type: noise
    lq_path: /path/to/denoise/LQ_train
    gt_path: /path/to/denoise/GT
    prompt: "a high quality clean image without noise, sharp details"

test:
  - name: Test_Derain
    deg_type: rain
    lq_path: /path/to/derain/LQ_val
    gt_path: /path/to/derain/GT
    prompt: "a high quality clean image without rain streaks, clear visibility"

  - name: Test_Dehaze
    deg_type: haze
    lq_path: /path/to/dehaze/LQ_val
    gt_path: /path/to/dehaze/GT
    prompt: "a high quality clear image without haze, high contrast, sharp details"

  - name: Test_Denoise
    deg_type: noise
    lq_path: /path/to/denoise/LQ_val
    gt_path: /path/to/denoise/GT
    prompt: "a high quality clean image without noise, sharp details"
