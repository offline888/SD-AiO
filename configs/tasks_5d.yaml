# 5D All-in-One — Standard Protocol (haze + rain + noise + deblur + low-light)
# Follows AirNet / PromptIR / R2R / MaskDCPT
#
# Repeat ratios: [1, 1, 1, 30, 60]
#   Dehaze  72,135 → ×1
#   Derain     200 → ×1
#   Denoise   5,144 → ×1
#   Deblur    2,103 → ×30  (effective 63,090/epoch)
#   Low-light   485 → ×60  (effective 29,100/epoch)

train:
  # ── Dehazing ──
  - name: Train_Dehaze
    deg_type: haze
    lq_path: /root/shared-nvme/data/Train-AIO/OTS_BETA/haze
    gt_path: /root/shared-nvme/data/Train-AIO/OTS_BETA/clear
    prompt: "a high quality clear image without haze, high contrast, sharp details"
    repeat_ratio: 1
    match_prefix_len: 4

  # ── Deraining ──
  - name: Train_Derain
    deg_type: rain
    lq_path: /root/shared-nvme/data/Train-AIO/Rain100L/rainy
    gt_path: /root/shared-nvme/data/Train-AIO/Rain100L/norain
    prompt: "a high quality clean image without rain streaks, clear visibility"
    repeat_ratio: 1

  # ── Denoising ──
  - name: Train_Denoise_BSD400
    deg_type: noise
    lq_path: /root/shared-nvme/data/Train-AIO/BSD400
    gt_path: /root/shared-nvme/data/Train-AIO/BSD400
    prompt: "a high quality clean image without noise, sharp details"
    repeat_ratio: 1
    noise_sigma: [15, 25, 50]

  - name: Train_Denoise_WED
    deg_type: noise
    lq_path: /root/shared-nvme/data/Train-AIO/WaterlooED
    gt_path: /root/shared-nvme/data/Train-AIO/WaterlooED
    prompt: "a high quality clean image without noise, sharp details"
    repeat_ratio: 1
    noise_sigma: [15, 25, 50]

  # ── Deblurring ──
  - name: Train_Deblur
    deg_type: deblur
    lq_path: /root/shared-nvme/data/GOPRO_Large/train
    gt_path: /root/shared-nvme/data/GOPRO_Large/train
    prompt: "a high quality sharp image without motion blur, clear details"
    repeat_ratio: 30
    # GoPro train: blur/ and sharp/ subdirs per scene, matched by filename
    lq_subdir: "blur"
    gt_subdir: "sharp"

  # ── Low-Light Enhancement ──
  - name: Train_Lowlight
    deg_type: lowlight
    lq_path: /root/shared-nvme/data/LOL/our485/low
    gt_path: /root/shared-nvme/data/LOL/our485/high
    prompt: "a high quality well-lit image with natural brightness, visible details"
    repeat_ratio: 60

test:
  # ── Dehazing ──
  - name: Test_Dehaze
    deg_type: haze
    lq_path: /root/shared-nvme/data/Test-AIO/SOTS/outdoor/hazy
    gt_path: /root/shared-nvme/data/Test-AIO/SOTS/outdoor/gt
    prompt: "a high quality clear image without haze, high contrast, sharp details"

  # ── Deraining ──
  - name: Test_Derain
    deg_type: rain
    lq_path: /root/shared-nvme/data/Test-AIO/RainTrainL/rain
    gt_path: /root/shared-nvme/data/Test-AIO/RainTrainL/norain
    prompt: "a high quality clean image without rain streaks, clear visibility"

  # ── Denoising (BSD68, 3 noise levels) ──
  - name: Test_Denoise_15
    deg_type: noise
    lq_path: /root/shared-nvme/data/Test-AIO/BSD68/noise15
    gt_path: /root/shared-nvme/data/Test-AIO/BSD68/original
    prompt: "a high quality clean image without noise, sharp details"

  - name: Test_Denoise_25
    deg_type: noise
    lq_path: /root/shared-nvme/data/Test-AIO/BSD68/noise25
    gt_path: /root/shared-nvme/data/Test-AIO/BSD68/original
    prompt: "a high quality clean image without noise, sharp details"

  - name: Test_Denoise_50
    deg_type: noise
    lq_path: /root/shared-nvme/data/Test-AIO/BSD68/noise50
    gt_path: /root/shared-nvme/data/Test-AIO/BSD68/original
    prompt: "a high quality clean image without noise, sharp details"

  # ── Deblurring ──
  - name: Test_Deblur
    deg_type: deblur
    lq_path: /root/shared-nvme/data/GOPRO_Large/test
    gt_path: /root/shared-nvme/data/GOPRO_Large/test
    prompt: "a high quality sharp image without motion blur, clear details"
    lq_subdir: "blur"
    gt_subdir: "sharp"

  # ── Low-Light ──
  - name: Test_Lowlight
    deg_type: lowlight
    lq_path: /root/shared-nvme/data/LOL/eval15/low
    gt_path: /root/shared-nvme/data/LOL/eval15/high
    prompt: "a high quality well-lit image with natural brightness, visible details"
