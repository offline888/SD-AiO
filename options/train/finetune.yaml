name: Flux_ImageRestoration_AdaLN
seed: 42
cudnn_benchmark: true

logging:
  swanlab_project: "Flux_ImageRestoration"
  log_interval: 10

accelerator:
  mixed_precision: "bf16"
  project_dir: /home/yhmi/data/experiments
  allow_tf32: true
  deepspeed_config:
    gradient_accumulation_steps: 8
    zero3_init_flag: true
    stage3_param_persistence_threshold: 1e4
    stage3_gather_16bit_weights_on_model_save: true
    stage3_sub_group_size: 1e8
    stage3_max_live_parameters: 1e9
    stage3_prefetch_bucket_size: 1e6
    stage3_model_autotune: true
    reduce_bucket_size: 1e6
    stage3_bucket_usage: 0.9

data:
  resolution: 512
  embed_dir: /home/yhmi/cached_embeddings/

  dataloader:
    train:
      batch_size: 1
      num_workers: 16
      pin_memory: true
      persistent_workers: true
      drop_last: true
      prefetch_factor: 4

    val:
      batch_size: 1
      num_workers: 16
      pin_memory: true
      persistent_workers: true
      drop_last: false
      prefetch_factor: 4

  datasets:
    TrainDataset1:
      lq_path: /home/yhmi/data/patches/10Rain/LQ_train
      hq_path: /home/yhmi/data/patches/10Rain/GT
      prompt: "remove rain from this image"
      enlarge_ratio: 2.0

    TrainDataset2:
      lq_path: /home/yhmi/data/patches/08Haze/LQ_train
      hq_path: /home/yhmi/data/patches/08Haze/GT
      prompt: "remove haze from this image"
      enlarge_ratio: 1.0

    TrainDataset3:
      lq_path: /home/yhmi/data/patches/14Lowlight/LQ_train
      hq_path: /home/yhmi/data/patches/14Lowlight/GT
      prompt: "enhance low light in this image"
      enlarge_ratio: 2.0

    TrainDataset4:
      lq_path: /home/yhmi/data/patches/09Lowlight_Haze/LQ_train
      hq_path: /home/yhmi/data/patches/09Lowlight_Haze/GT
      prompt: "enhance low light and remove haze from this image"
      enlarge_ratio: 1.0

    TrainDataset5:
      lq_path: /home/yhmi/data/patches/13Rain_Haze/LQ_train
      hq_path: /home/yhmi/data/patches/13Rain_Haze/GT
      prompt: "remove rain and haze from this image"
      enlarge_ratio: 1.0

    ValDataset1:
      lq_path: /home/yhmi/data/patches/10Rain/LQ_val
      hq_path: /home/yhmi/data/patches/10Rain/GT
      prompt: "remove rain from this image"

    ValDataset2:
      lq_path: /home/yhmi/data/patches/08Haze/LQ_val
      hq_path: /home/yhmi/data/patches/08Haze/GT
      prompt: "remove haze from this image"

    ValDataset3:
      lq_path: /home/yhmi/data/patches/14Lowlight/LQ_val
      hq_path: /home/yhmi/data/patches/14Lowlight/GT
      prompt: "enhance low light in this image"

    ValDataset4:
      lq_path: /home/yhmi/data/patches/09Lowlight_Haze/LQ_val
      hq_path: /home/yhmi/data/patches/09Lowlight_Haze/GT
      prompt: "enhance low light and remove haze from this image"

    ValDataset5:
      lq_path: /home/yhmi/data/patches/13Rain_Haze/LQ_val
      hq_path: /home/yhmi/data/patches/13Rain_Haze/GT
      prompt: "remove rain and haze from this image"

network:
  pretrained_model_name_or_path: /home/yhmi/All_in_one/flux1-schnell
  gradient_checkpointing: false
  offload: false
  num_classes: 4
  degradation_classifier_path: /home/yhmi/data/model/best_model.pth
  dino_type: /home/yhmi/data/model/dinov2-base
  unfreeze_adaln: true

train:
  num_train_epochs: 3
  max_grad_norm: 1.0
  gradient_accumulation_steps: 8
  proportion_empty_prompts: 0.0
  fixed_timestep: 300
  guidance_scale: 3.0

  optim:
    lr: 1e-4
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    epsilon: 1e-8

  scheduler:
    type: "cosine"
    lr_warmup_steps: 5000
    lr_num_cycles: 2

loss:
  weighting_scheme: "none"
  logit_mean: 0.0
  logit_std: 1.0
  mode_scale: 1.29

val:
  val_freq: 1
  val_freq_iters: 500
  num_vis_samples: 5    
  guidance_scale: 3.0
  fixed_val_timestep: 300
  max_val_samples: null

output:
  output_dir: /home/yhmi/data/experiments/flux_finetune
  save_freq: 1
  save_freq_iters: 5000  
