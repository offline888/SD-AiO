name: Flux_Schnell_Restore
seed: 42
cudnn_benchmark: true

logging:
  use_swanlab: true
  swanlab_project: "Flux_Schnell_Restore"
  log_interval: 10

accelerator:
  use_swanlab: true
  mixed_precision: "no" # "no", "fp16", "bf16"
  find_unused_parameters: True
  project_dir: /home/yhmi/data/experiments

data:
  resolution: 1024

  degradations: ['Blur', 'Noise', 'Clean', 'Haze', 'Rain', 'Lowlight']

  dataloader:
    train:
      batch_size: 16
      num_workers: 12
      pin_memory: true
      persistent_workers: true
      drop_last: false
      prefetch_factor: 2

    val:
      batch_size: 8
      num_workers: 8
      pin_memory: true
      persistent_workers: true
      drop_last: false
      prefetch_factor: 2

  datasets:
    # Single degradation datasets - training
    TrainDataset1:
      name: Blur
      degradation: Blur
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/GT
      resize: 1024
      #use_hflip: true
      #use_rot: true

    TrainDataset2:
      name: Rain
      degradation: Rain
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/10Rain/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/10Rain/GT
      resize: 1024
      #use_hflip: true
      #use_rot: true

    TrainDataset3:
      name: Haze
      degradation: Haze
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/08Haze/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/08Haze/GT
      resize: 1024
      #use_hflip: true
      #use_rot: true

    TrainDataset4:
      name: Lowlight
      degradation: Lowlight
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/14Lowlight/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/14Lowlight/GT
      resize: 1024
      #use_hflip: true
      #use_rot: true

    TrainDataset5:
      name: Noise
      degradation: Noise
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/05Noise/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/05Noise/GT
      resize: 1024
      #use_hflip: true
      #use_rot: true

    TrainDataset6:
      name: Clean
      degradation: Clean
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/GT
      resize: 1024
      #use_hflip: true
      #use_rot: true

    # Combined degradation datasets - training
    TrainDataset7:
      name: Blur_Noise
      degradation: [Blur, Noise]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/02Blur_Noise/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/02Blur_Noise/GT
      resize: 1024

    TrainDataset8:
      name: Lowlight_Haze
      degradation: [Lowlight, Haze]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/09Lowlight_Haze/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/09Lowlight_Haze/GT
      resize: 1024

    TrainDataset9:
      name: Rain_Haze
      degradation: [Rain, Haze]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/13Rain_Haze/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/13Rain_Haze/GT
      resize: 1024

    TrainDataset10:
      name: Lowlight_Blur
      degradation: [Lowlight, Blur]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/15Lowlight_Blur/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/15Lowlight_Blur/GT
      resize: 1024

    TrainDataset11:
      name: Lowlight_Noise
      degradation: [Lowlight, Noise]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/16Lowlight_Noise/LQ_train
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/16Lowlight_Noise/GT
      resize: 1024

    # Single degradation datasets - validation
    ValDataset1:
      name: Blur
      degradation: Blur
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/GT
      resize: 1024

    ValDataset2:
      name: Rain
      degradation: Rain
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/10Rain/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/10Rain/GT
      resize: 1024

    ValDataset3:
      name: Haze
      degradation: Haze
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/08Haze/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/08Haze/GT
      resize: 1024

    ValDataset4:
      name: Lowlight
      degradation: Lowlight
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/14Lowlight/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/14Lowlight/GT
      resize: 1024

    ValDataset5:
      name: Noise
      degradation: Noise
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/05Noise/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/05Noise/GT
      resize: 1024

    ValDataset6:
      name: Clean
      degradation: Clean
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/01Blur/GT
      resize: 1024

    # Combined degradation datasets - validation
    ValDataset7:
      name: Blur_Noise
      degradation: [Blur, Noise]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/02Blur_Noise/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/02Blur_Noise/GT
      resize: 1024

    ValDataset8:
      name: Lowlight_Haze
      degradation: [Lowlight, Haze]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/09Lowlight_Haze/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/09Lowlight_Haze/GT
      resize: 1024

    ValDataset9:
      name: Rain_Haze
      degradation: [Rain, Haze]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/13Rain_Haze/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/13Rain_Haze/GT
      resize: 1024

    ValDataset10:
      name: Lowlight_Blur
      degradation: [Lowlight, Blur]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/15Lowlight_Blur/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/15Lowlight_Blur/GT
      resize: 1024

    ValDataset11:
      name: Lowlight_Noise
      degradation: [Lowlight, Noise]
      lq_path: /home/yhmi/data/Datadir/FoundIR_768/16Lowlight_Noise/LQ_val
      hq_path: /home/yhmi/data/Datadir/FoundIR_768/16Lowlight_Noise/GT
      resize: 1024

network:
  type: FluxSchnell
  pretrained_model_name_or_path: /home/yhmi/data/model/black-forest-labs/FLUX.1-schnell
  use_lora: false
  lora_rank: 16
  lora_alpha: 32
  gradient_checkpointing: false

train:
  num_train_epochs: 10
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1

  optim:
    type: AdamW
    lr: 1e-5
    weight_decay: 0.01

  scheduler:
    type: constant_with_warmup
    lr_warmup_steps: 500

  loss:
    weighting_scheme: "none"

val:
  val_freq: 1
  guidance_scale: 30.0
  max_val_samples: 20

output:
  save_freq: 1
  upcast_before_saving: false
